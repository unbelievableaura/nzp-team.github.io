<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta content="Nazi Zombies: Portable" property="og:title" />
    <meta content="Call of Duty: Zombies de-make, now in your browser via WebGL!" property="og:description" />
    <meta content="https://nzp-team.github.io/latest/game.html" property="og:url" />
    <meta content="https://nzp-team.github.io/latest/nzportable.ico" property="og:image" />
    <meta content="#6e0d00" data-react-helmet="true" name="theme-color" />
    <title>NZ: Portable</title>
    <link rel="icon" href="nzportable.ico">
    <style>
      :root {
        --menu-text: #d4d5d8;
        --menu-red: #a91a1a;
        --menu-red-soft: #7e1414;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: #000;
        color: var(--menu-text);
        font-family: "Lucida Console", "Courier New", monospace;
      }

      .emscripten {
        padding-right: 0;
        margin-left: auto;
        margin-right: auto;
        display: block;
      }

      div.emscripten {
        text-align: center;
        padding: 0;
        margin: 0;
      }

      canvas.emscripten {
        border: 0 none;
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
        background: #000;
      }

      #canvas[hidden] {
        display: none;
      }

      #intro-overlay {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: grid;
        place-items: center;
        background: #040404;
      }

      #intro-bg {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(0deg, rgba(0, 0, 0, 0.64), rgba(0, 0, 0, 0.42)),
          url("assets/intro/bg.png");
        background-size: cover;
        background-position: center;
        image-rendering: pixelated;
      }

      #intro-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.03) 0,
          rgba(255, 255, 255, 0.03) 1px,
          rgba(0, 0, 0, 0.0) 2px,
          rgba(0, 0, 0, 0.0) 4px
        );
      }

      #intro-panel {
        position: relative;
        width: min(1024px, calc(100vw - 38px));
        min-height: min(540px, calc(100vh - 32px));
        border-top: 3px solid rgba(122, 125, 131, 0.7);
        border-bottom: 3px solid rgba(122, 125, 131, 0.7);
        background: rgba(0, 0, 0, 0.42);
        box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.5);
        padding: 34px 28px;
      }

      .intro-row-line {
        width: 100%;
        height: 4px;
        background: url("assets/intro/line.png") center/contain repeat-x;
        opacity: 0.85;
      }

      #intro-logo {
        width: clamp(130px, 18vw, 220px);
        image-rendering: pixelated;
        filter: drop-shadow(0 0 12px rgba(0, 0, 0, 0.8));
      }

      #intro-heading {
        margin-top: 14px;
      }

      #intro-title-main {
        margin: 0;
        min-height: clamp(44px, 8vw, 88px);
      }

      #intro-title-sub {
        margin-top: 8px;
        min-height: clamp(18px, 2.4vw, 28px);
      }

      #intro-form {
        margin-top: 30px;
        width: min(930px, 100%);
      }

      #intro-name-row {
        display: grid;
        grid-template-columns: minmax(200px, 36%) 1fr;
        align-items: center;
        gap: 14px;
      }

      #intro-name-label {
        min-height: clamp(18px, 2.5vw, 28px);
      }

      #intro-name-input {
        height: clamp(44px, 5.8vw, 74px);
        border: 2px solid #24272d;
        background: rgba(5, 6, 7, 0.88);
        color: var(--menu-text);
        padding: 0 14px;
        font-size: clamp(17px, 2.2vw, 44px);
        outline: none;
      }

      #intro-name-input:focus {
        border-color: #595f67;
        box-shadow: 0 0 0 2px rgba(21, 21, 21, 0.8);
      }

      #intro-controls {
        margin-top: 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      #intro-ready {
        min-height: 16px;
      }

      #intro-enter-btn {
        min-width: 220px;
        height: 52px;
        border: 2px solid #702020;
        background: linear-gradient(180deg, rgba(147, 27, 27, 0.95), rgba(86, 11, 11, 0.92));
        color: #ece9e9;
        font-family: inherit;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
      }

      #intro-enter-btn:disabled {
        opacity: 0.55;
        cursor: default;
      }

      #intro-status {
        margin-top: 22px;
      }

      #intro-status-text {
        min-height: 16px;
      }

      #intro-progress-shell {
        margin-top: 9px;
        height: 16px;
        border: 1px solid #454b54;
        background: rgba(3, 3, 3, 0.85);
        position: relative;
        overflow: hidden;
      }

      #intro-progress-fill {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--menu-red-soft), var(--menu-red));
        transition: width 110ms linear;
      }

      #intro-progress-shell.indeterminate #intro-progress-fill {
        width: 35%;
        animation: intro-slide 1.2s linear infinite;
      }

      #intro-progress-percent {
        margin-top: 8px;
        text-align: right;
        min-height: 12px;
      }

      #intro-cursor {
        position: absolute;
        right: 22px;
        bottom: 18px;
        width: 42px;
        height: 42px;
        background: url("assets/intro/hilight.png") center/contain no-repeat;
        opacity: 0.75;
        animation: intro-pulse 1.8s ease-in-out infinite;
      }

      #intro-overlay.intro-loading #intro-name-row,
      #intro-overlay.intro-loading #intro-controls {
        opacity: 0.56;
        pointer-events: none;
      }

      #intro-overlay.intro-handoff {
        opacity: 0;
        visibility: hidden;
        transition: opacity 280ms ease, visibility 280ms ease;
      }

      .bitmap-text {
        display: inline-flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0;
      }

      .bitmap-glyph {
        display: inline-block;
        width: calc(8px * var(--scale, 2));
        height: calc(8px * var(--scale, 2));
        background-image: url("assets/intro/charset.png");
        background-repeat: no-repeat;
        background-size: calc(128px * var(--scale, 2)) calc(128px * var(--scale, 2));
        image-rendering: pixelated;
      }

      .bitmap-space {
        display: inline-block;
        width: calc(6px * var(--scale, 2));
        height: calc(8px * var(--scale, 2));
      }

      .bitmap-red .bitmap-glyph {
        filter: hue-rotate(-18deg) saturate(150%) brightness(82%);
      }

      .bitmap-small {
        --scale: 1.25;
      }

      .bitmap-medium {
        --scale: 1.8;
      }

      .bitmap-large {
        --scale: 3;
      }

      .legacy-hidden {
        position: absolute !important;
        width: 1px !important;
        height: 1px !important;
        padding: 0 !important;
        margin: -1px !important;
        overflow: hidden !important;
        clip: rect(0, 0, 0, 0) !important;
        white-space: nowrap !important;
        border: 0 !important;
      }

      @keyframes intro-slide {
        0% { transform: translateX(-130%); }
        100% { transform: translateX(330%); }
      }

      @keyframes intro-pulse {
        0%, 100% { opacity: 0.58; }
        50% { opacity: 0.9; }
      }

      @media (max-width: 740px) {
        #intro-panel {
          width: calc(100vw - 20px);
          min-height: calc(100vh - 22px);
          padding: 20px 14px;
        }

        #intro-name-row {
          grid-template-columns: 1fr;
          gap: 8px;
        }

        #intro-controls {
          flex-direction: column;
          align-items: stretch;
        }

        #intro-enter-btn {
          width: 100%;
          min-width: 0;
        }

        .bitmap-large {
          --scale: 2.2;
        }

        .bitmap-medium {
          --scale: 1.45;
        }
      }
    </style>
  </head>
  <body ondrop="gotdrop(event);" ondragover="event.preventDefault()">
    <div id="intro-overlay" role="dialog" aria-label="NZP Intro">
      <div id="intro-bg" aria-hidden="true"></div>
      <section id="intro-panel">
        <div class="intro-row-line"></div>
        <img id="intro-logo" src="assets/intro/logo.png" alt="NZP logo">
        <div id="intro-heading">
          <h1 id="intro-title-main" class="bitmap-text bitmap-large" aria-label="NAZI ZOMBIES"></h1>
          <div id="intro-title-sub" class="bitmap-text bitmap-medium bitmap-red" aria-label="ON SOLANA"></div>
        </div>
        <div class="intro-row-line"></div>

        <div id="intro-form">
          <div id="intro-name-row">
            <label id="intro-name-label" for="intro-name-input" class="bitmap-text bitmap-medium" aria-label="PLAYER NAME"></label>
            <input id="intro-name-input" type="text" maxlength="24" autocomplete="name" spellcheck="false" value="Unknown Soldier">
          </div>

          <div id="intro-controls">
            <div id="intro-ready" class="bitmap-text bitmap-small" aria-label="PROFILE READY"></div>
            <button type="button" id="intro-enter-btn" aria-label="ENTER"><span id="intro-enter-text" class="bitmap-text bitmap-medium"></span></button>
          </div>

          <div id="intro-status">
            <div id="intro-status-text" class="bitmap-text bitmap-small" aria-live="polite"></div>
            <div id="intro-progress-shell" aria-hidden="true">
              <div id="intro-progress-fill"></div>
            </div>
            <div id="intro-progress-percent" class="bitmap-text bitmap-small" aria-live="polite"></div>
          </div>
        </div>

        <div id="intro-cursor" aria-hidden="true"></div>
      </section>
    </div>

    <div class="emscripten legacy-hidden" id="status">Please allow/unblock our javascript to play.</div>
    <div id="dropzone" class="legacy-hidden" ondrop="gotdrop(event);" ondragover="event.preventDefault()" hidden="1">Drop Zone</div>
    <button type="button" onclick="begin()" class="legacy-hidden" id="begin" hidden="1">Click To Begin!</button>
    <div class="emscripten legacy-hidden">
      <progress value="0" max="100" id="progress" hidden="1"></progress>
    </div>

    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" hidden="1"></canvas>

    <script type="text/javascript">
      function renderBitmapText(target, text) {
        if (!target) {
          return;
        }
        target.textContent = "";
        var source = String(text || "").toUpperCase();
        for (var i = 0; i < source.length; i++) {
          var ch = source.charCodeAt(i);
          if (source[i] === " ") {
            var space = document.createElement("span");
            space.className = "bitmap-space";
            target.appendChild(space);
            continue;
          }
          if (ch < 0 || ch > 127) {
            ch = 63;
          }
          var col = ch & 15;
          var row = ch >> 4;
          var glyph = document.createElement("span");
          glyph.className = "bitmap-glyph";
          glyph.style.backgroundPosition = "calc(" + (-col * 8) + "px * var(--scale, 2)) calc(" + (-row * 8) + "px * var(--scale, 2))";
          target.appendChild(glyph);
        }
      }

      var IntroUI = {
        state: "idle",
        hidden: false,
        downloadsDone: false,
        frameReady: false,
        engineReady: false,
        fallbackHandoffTimer: null,
        handoffDone: false,
        els: {},
        init: function() {
          this.els.overlay = document.getElementById("intro-overlay");
          this.els.input = document.getElementById("intro-name-input");
          this.els.enter = document.getElementById("intro-enter-btn");
          this.els.status = document.getElementById("intro-status-text");
          this.els.bar = document.getElementById("intro-progress-fill");
          this.els.percent = document.getElementById("intro-progress-percent");
          this.els.shell = document.getElementById("intro-progress-shell");
          this.els.titleMain = document.getElementById("intro-title-main");
          this.els.titleSub = document.getElementById("intro-title-sub");
          this.els.nameLabel = document.getElementById("intro-name-label");
          this.els.ready = document.getElementById("intro-ready");
          this.els.enterText = document.getElementById("intro-enter-text");
          var ok = !!(this.els.overlay && this.els.input && this.els.enter && this.els.status && this.els.bar && this.els.percent && this.els.shell);
          if (ok) {
            renderBitmapText(this.els.titleMain, "NAZI ZOMBIES");
            renderBitmapText(this.els.titleSub, "ON SOLANA");
            renderBitmapText(this.els.nameLabel, "PLAYER NAME");
            renderBitmapText(this.els.ready, "PROFILE READY");
            renderBitmapText(this.els.enterText, "ENTER");
            renderBitmapText(this.els.status, "AWAITING DEPLOYMENT ORDERS...");
            renderBitmapText(this.els.percent, "0%");
          }
          return ok;
        },
        setState: function(next) {
          this.state = next;
          if (this.els.overlay) {
            this.els.overlay.classList.toggle("intro-loading", next === "starting" || next === "loading");
          }
          if (this.els.input) {
            this.els.input.disabled = next !== "idle";
          }
          if (this.els.enter) {
            this.els.enter.disabled = next !== "idle";
          }
          if (this.els.enterText) {
            if (next === "starting" || next === "loading" || next === "engine_ready") {
              renderBitmapText(this.els.enterText, "LOADING...");
            } else {
              renderBitmapText(this.els.enterText, "ENTER");
            }
          }
        },
        setStatus: function(text, percent, indeterminate) {
          if (!this.els.status) {
            return;
          }
          renderBitmapText(this.els.status, text || "");
          if (indeterminate) {
            this.els.shell.classList.add("indeterminate");
          } else {
            this.els.shell.classList.remove("indeterminate");
          }
          if (typeof percent === "number" && isFinite(percent)) {
            var value = Math.max(0, Math.min(100, percent));
            this.els.bar.style.width = value + "%";
            renderBitmapText(this.els.percent, Math.round(value) + "%");
          }
        },
        markDownloadsDone: function() {
          this.downloadsDone = true;
          this.onGateUpdated();
        },
        markFrameReady: function() {
          this.frameReady = true;
          this.onGateUpdated();
        },
        markEngineReady: function() {
          this.engineReady = true;
          this.onGateUpdated();
        },
        scheduleFallbackHandoff: function() {
          if (this.fallbackHandoffTimer || this.handoffDone) {
            return;
          }
          var self = this;
          this.fallbackHandoffTimer = setTimeout(function() {
            if (!self.handoffDone && self.downloadsDone && self.engineReady) {
              self.setStatus("LAUNCHING...", 100, false);
              self.handoff();
            }
          }, 1800);
        },
        onGateUpdated: function() {
          if (this.handoffDone || !this.downloadsDone || !this.engineReady) {
            return;
          }
          this.scheduleFallbackHandoff();
          if (!this.frameReady) {
            this.setState("engine_ready");
            this.setStatus("FINALIZING LAUNCH...", 100, false);
            return;
          }
          this.setState("engine_ready");
          this.setStatus("FINALIZING LAUNCH...", 100, false);
          var self = this;
          setTimeout(function() {
            self.handoff();
          }, 650);
        },
        handoff: function() {
          if (this.handoffDone || !this.downloadsDone || !this.engineReady) {
            return;
          }
          if (this.fallbackHandoffTimer) {
            clearTimeout(this.fallbackHandoffTimer);
            this.fallbackHandoffTimer = null;
          }
          this.handoffDone = true;
          this.setState("engine_ready");
          var self = this;
          requestAnimationFrame(function() {
            requestAnimationFrame(function() {
              self.setState("handoff");
              self.hide();
            });
          });
        },
        hide: function() {
          if (this.hidden || !this.els.overlay) {
            return;
          }
          this.hidden = true;
          this.els.overlay.classList.add("intro-handoff");
          document.getElementById("canvas").hidden = false;
        }
      };

      var NameStore = {
        key: "nzp_player_name",
        sanitize: function(raw) {
          var value = String(raw || "");
          value = value.replace(/[\u0000-\u001F\u007F"'`\\]/g, "").trim();
          if (!value.length) {
            value = "Unknown Soldier";
          }
          if (value.length > 24) {
            value = value.slice(0, 24);
          }
          return value;
        },
        load: function() {
          try {
            return this.sanitize(localStorage.getItem(this.key));
          } catch (_err) {
            return "Unknown Soldier";
          }
        },
        save: function(name) {
          try {
            localStorage.setItem(this.key, name);
          } catch (_err) {
          }
        }
      };

      var BootBridge = {
        started: false,
        ensureArgs: function(name) {
          var current = Array.isArray(Module.arguments) ? Module.arguments.slice() : [];
          var next = [];
          for (var i = 0; i < current.length; i++) {
            if (current[i] === "+name") {
              i += 1;
              continue;
            }
            next.push(current[i]);
          }
          next.push("+name");
          next.push(name);
          Module.arguments = next;
        },
        handleEnterAction: function() {
          if (this.started || Module.began) {
            return;
          }
          this.started = true;
          var name = NameStore.sanitize(IntroUI.els.input.value);
          IntroUI.els.input.value = name;
          NameStore.save(name);
          this.ensureArgs(name);
          IntroUI.setState("starting");
          IntroUI.setStatus("DOWNLOADING...", 0, false);
          begin();
        }
      };

      var Module = {
        files: {
          "default.fmf": "default.fmf",
          "nzp/game.pk3": "nzp/game.pk3",
          "nzp/progs.pk3": "nzp/progs.pk3"
        },
        print: function(msg) {
          console.log(msg);
        },
        printErr: function(text) {
          console.log(text);
        },
        canvas: document.getElementById("canvas"),
        setStatus: function(text) {
          if (Module.setStatus.interval) {
            clearInterval(Module.setStatus.interval);
          }
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var statusElement = document.getElementById("status");
          var progressElement = document.getElementById("progress");
          var percent = null;
          var indeterminate = true;

          if (m) {
            text = m[1].trim();
            var v = parseFloat(m[2]);
            var max = parseFloat(m[4]);
            progressElement.value = v;
            progressElement.max = max;
            progressElement.hidden = false;
            if (max > 0) {
              percent = (v / max) * 100;
              indeterminate = false;
            }
          } else {
            progressElement.value = null;
            progressElement.max = null;
            progressElement.hidden = true;
          }

          statusElement.innerHTML = text;
          statusElement.hidden = text.length === 0;

          if (IntroUI.state === "starting" || IntroUI.state === "loading") {
            IntroUI.setState("loading");
            IntroUI.setStatus((text || "").toUpperCase(), percent, indeterminate);
          }

          if (text === "All downloads complete.") {
            IntroUI.setStatus("ALL DOWNLOADS COMPLETE.", 100, false);
            IntroUI.markDownloadsDone();
          }
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")" : "All downloads complete.");
        },
        postRun: [
          function() {
            if (Module["sched"] === undefined) {
              alert("Unable to initialise. You may need to restart your browser. If you get this often and inconsistently, consider using a 64bit browser instead.");
              Module.setStatus("Initialisation Failure");
              return;
            }
            IntroUI.markEngineReady();
            // Only hand off after at least one scheduled frame callback has fired.
            var originalSched = Module.sched;
            var frameSeen = false;
            Module.sched = function() {
              if (!frameSeen) {
                frameSeen = true;
                IntroUI.markFrameReady();
              }
              return originalSched.apply(this, arguments);
            };
            setTimeout(function() {
              if (!frameSeen && IntroUI.downloadsDone && !IntroUI.handoffDone) {
                IntroUI.setStatus("FINALIZING LAUNCH...", 100, false);
              }
            }, 2000);
          }
        ]
      };

      function begin() {
        if (Module.began) {
          return;
        }
        Module.began = true;
        document.getElementById("dropzone").hidden = true;
        document.getElementById("begin").hidden = true;
        Module.setStatus("Downloading...");

        var s = document.createElement("script");
        s.setAttribute("src", "ftewebgl.js");
        s.setAttribute("type", "text/javascript");
        s.setAttribute("charset", "utf-8");
        s.addEventListener("error", function() {
          alert("Oh noes! we got an error!");
          Module.setStatus("Unable to download engine javascript");
        }, false);
        document.head.appendChild(s);
      }

      function fixupfilepath(fname, path) {
        if (path != "") {
          return path + fname;
        }
        var ext = fname.substr(fname.lastIndexOf(".") + 1);
        if (ext == "fmf" || ext == "kpf") {
          return fname;
        }
        if (ext == "bsp" || ext == "map" || ext == "lit" || ext == "lux") {
          return "id1/maps/" + fname;
        }
        return "id1/" + fname;
      }

      function showfiles() {
        if (Module.began) {
          return;
        }
        Module.setStatus("");
        document.getElementById("dropzone").hidden = false;
        document.getElementById("begin").hidden = false;
        var nt = "Drag gamedirs or individual package files here to make them available!<br/>Active Files:<br/><pre>";
        var keys = Object.keys(Module.files);
        for (var i = 0; i < keys.length; i++) {
          if (Module.files[keys[i]] instanceof ArrayBuffer) {
            var sz = Module.files[keys[i]].byteLength;
            if (sz > 512 * 1024) {
              sz = (sz / (1024 * 1024)) + "mb";
            } else if (sz > 512) {
              sz = (sz / 1024) + "kb";
            } else {
              sz = sz + " bytes";
            }
            nt += "    " + keys[i] + " (" + sz + ")<br/>";
          } else {
            nt += "    " + keys[i] + "<br/>";
          }
        }
        nt += "</pre>(" + keys.length + " files)";
        document.getElementById("dropzone").innerHTML = nt;
      }

      function scanfiles(item, path) {
        if (item.isFile) {
          item.file(function(f) {
            var n = fixupfilepath(f.name, path);
            Module.files[n] = f.arrayBuffer();
            Module.files[n].then(function(buf) {
              Module.files[n] = buf;
              showfiles();
            });
          });
        } else if (item.isDirectory) {
          var dirReader = item.createReader();
          dirReader.readEntries(function(entries) {
            for (var i = 0; i < entries.length; i++) {
              scanfiles(entries[i], path + item.name + "/");
            }
          });
        }
      }

      function gotdrop(ev) {
        ev.preventDefault();
        for (var i = 0; i < ev.dataTransfer.items.length; i++) {
          if (ev.dataTransfer.items[i].webkitGetAsEntry) {
            var d = ev.dataTransfer.items[i].webkitGetAsEntry();
            if (d) {
              scanfiles(d, "");
            }
          } else if (ev.dataTransfer.items[i].kind === "file") {
            var f = ev.dataTransfer.items[i].getAsFile();
            var n = fixupfilepath(f.name);
            Module.files[n] = f.arrayBuffer();
            Module.files[n].then(function(buf) {
              Module.files[n] = buf;
              showfiles();
            });
          }
        }
        showfiles();
      }

      (function initIntroBoot() {
        if (!IntroUI.init()) {
          showfiles();
          return;
        }

        IntroUI.els.input.value = NameStore.load();
        IntroUI.els.enter.addEventListener("click", function() {
          BootBridge.handleEnterAction();
        });
        IntroUI.els.input.addEventListener("keydown", function(ev) {
          if (ev.key === "Enter") {
            ev.preventDefault();
            BootBridge.handleEnterAction();
          }
        });

        if (window.location.hash != "") {
          requestAnimationFrame(function() {
            setTimeout(function() {
              BootBridge.handleEnterAction();
            }, 60);
          });
        }
      })();
    </script>
