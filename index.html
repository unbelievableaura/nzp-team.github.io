    <style>
      :root {
        --menu-text: #d4d5d8;
        --menu-red: #a91a1a;
        --menu-red-border: #660000;
        --menu-line: #333;
        --intro-ui-scale: 1;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        color: var(--menu-text);
        font-family: "Lucida Console", "Courier New", monospace;
      }

      .emscripten {
        padding-right: 0;
        margin-left: auto;
        margin-right: auto;
        display: block;
      }

      div.emscripten {
        text-align: center;
        padding: 0;
        margin: 0;
      }

      canvas.emscripten {
        border: 0 none;
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
        background: #000;
      }

      #canvas[hidden] {
        display: none;
      }

      #intro-overlay {
        position: fixed;
        inset: 0;
        z-index: 30;
        background: #000;
      }

      #intro-bg {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(0deg, rgba(0, 0, 0, 0.68), rgba(0, 0, 0, 0.5)),
          url("assets/intro/bg.png") center/cover no-repeat;
        image-rendering: pixelated;
      }

      #intro-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.02) 0,
          rgba(255, 255, 255, 0.02) 1px,
          rgba(0, 0, 0, 0) 2px,
          rgba(0, 0, 0, 0) 4px
        );
      }

      #intro-top-bar,
      #intro-bottom-bar {
        position: absolute;
        left: 0;
        right: 0;
        height: 55px;
        background: rgba(0, 0, 0, 0.92);
        pointer-events: none;
      }

      #intro-top-bar {
        top: 0;
      }

      #intro-bottom-bar {
        bottom: 0;
      }

      #intro-top-line,
      #intro-bottom-line {
        position: absolute;
        left: 0;
        right: 0;
        height: 3px;
        background: var(--menu-line);
        pointer-events: none;
      }

      #intro-top-line {
        top: 52px;
      }

      #intro-bottom-line {
        bottom: 55px;
      }

      #intro-hud {
        position: absolute;
        inset: 0;
        transform-origin: top left;
        transform: scale(var(--intro-ui-scale));
        width: calc(100% / var(--intro-ui-scale));
        height: calc(100% / var(--intro-ui-scale));
      }

      #intro-title-block {
        position: absolute;
        left: 6px;
        top: 8px;
        display: flex;
        align-items: flex-end;
        gap: 14px;
      }

      #intro-title-main,
      #intro-title-sub {
        margin: 0;
      }

      #intro-title-sub {
        transform: none;
      }

      #intro-menu-column {
        position: absolute;
        top: 0;
        left: 0;
        width: 680px;
        min-height: 320px;
      }

      .intro-menu-row {
        position: absolute;
        left: 0;
        width: 322px;
        height: 30px;
        margin-top: 0;
        border: 0;
        background: transparent;
        padding: 0;
        display: block;
        text-decoration: none;
        cursor: pointer;
      }

      .intro-menu-row:focus-visible {
        outline: none;
      }

      .intro-menu-row::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        opacity: 0;
        transition: opacity 85ms steps(1, end);
      }

      .intro-menu-row::after {
        content: "";
        position: absolute;
        inset: 0;
        border-top: 2px solid transparent;
        border-bottom: 2px solid transparent;
        border-right: 2px solid transparent;
        opacity: 0;
        transition: opacity 85ms steps(1, end);
      }

      .intro-menu-row.is-active::before,
      .intro-menu-row:hover::before,
      .intro-menu-row:focus-visible::before {
        opacity: 1;
      }

      .intro-menu-row.is-active::after,
      .intro-menu-row:hover::after,
      .intro-menu-row:focus-visible::after {
        border-top-color: var(--menu-red-border);
        border-bottom-color: var(--menu-red-border);
        border-right-color: var(--menu-red-border);
        opacity: 1;
        animation: intro-hover-border 120ms steps(1, end) 1;
      }

      .intro-menu-row.is-disabled {
        opacity: 0.55;
        cursor: default;
      }

      .intro-menu-row.is-disabled::before,
      .intro-menu-row.is-disabled::after {
        display: none;
      }

      .intro-row-text {
        position: absolute;
        right: 15px;
        top: 2px;
        z-index: 1;
      }

      .intro-menu-row.is-active .intro-row-text .bitmap-glyph,
      .intro-menu-row:hover .intro-row-text .bitmap-glyph,
      .intro-menu-row:focus-visible .intro-row-text .bitmap-glyph {
        filter: hue-rotate(-28deg) saturate(190%) brightness(92%);
        transition: filter 85ms steps(1, end);
      }

      #intro-name-row {
        top: 72px;
      }

      #intro-name-label {
        position: absolute;
        right: 15px;
        top: 2px;
        z-index: 1;
      }

      #intro-name-shell {
        position: absolute;
        left: 346px;
        top: 72px;
        width: 322px;
        height: 32px;
        border: 2px solid #313131;
        background: rgba(0, 0, 0, 1);
        z-index: 2;
      }

      #intro-name-input {
        width: 100%;
        height: 100%;
        border: 0;
        outline: none;
        background: transparent;
        color: var(--menu-text);
        font-family: "Lucida Console", "Courier New", monospace;
        font-size: 22px;
        line-height: 28px;
        letter-spacing: 0.25px;
        padding: 0 6px;
      }

      #intro-name-caret {
        position: absolute;
        left: 6px;
        top: 4px;
        width: 2px;
        height: 22px;
        background: #cfd2d7;
        opacity: 0;
        pointer-events: none;
      }

      #intro-name-shell.show-select-caret #intro-name-caret {
        opacity: 1;
        animation: intro-blink 1s steps(1, end) infinite;
      }

      .intro-row-order-name { top: 78px; }
      .intro-row-order-enter { top: 119px; }
      .intro-row-order-pump { top: 152px; }
      .intro-row-order-dex { top: 185px; }
      .intro-row-order-community { top: 218px; }

      #intro-menu-divider {
        position: absolute;
        left: 0;
        width: 317px;
        height: 2px;
        margin: 0;
        background: var(--menu-line);
      }

      .intro-divider-order-3 { top: 145px; }

      #intro-status-wrap {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 82px;
      }

      #intro-status-text {
        text-align: center;
        min-height: 34px;
      }

      #intro-progress-shell {
        margin: 14px auto 0;
        width: min(640px, calc(100vw - 40px));
        height: 12px;
        border: 1px solid #464c53;
        background: rgba(3, 3, 3, 0.9);
        position: relative;
        overflow: hidden;
      }

      #intro-progress-fill {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #6f1212, var(--menu-red));
        transition: width 110ms linear;
      }

      #intro-progress-shell.indeterminate #intro-progress-fill {
        width: 35%;
        animation: intro-slide 1.2s linear infinite;
      }

      #intro-progress-percent {
        margin-top: 10px;
        text-align: center;
        min-height: 22px;
      }

      #intro-description-strip {
        position: absolute;
        left: 0;
        right: 0;
        bottom: -34px;
        text-align: center;
        min-height: 30px;
      }

      #intro-cursor {
        position: absolute;
        right: 8px;
        bottom: 64px;
        width: 42px;
        height: 42px;
        background: url("assets/intro/hilight.png") center/contain no-repeat;
        image-rendering: pixelated;
        opacity: 0.75;
        animation: intro-pulse 1.8s ease-in-out infinite;
        pointer-events: none;
      }

      #intro-overlay.intro-loading #intro-name-row,
      #intro-overlay.intro-loading #intro-enter-btn {
        opacity: 0.64;
      }

      #intro-overlay.intro-loading #intro-name-shell {
        opacity: 0.64;
      }

      #intro-overlay.intro-handoff {
        opacity: 0;
        visibility: hidden;
        transition: opacity 280ms ease, visibility 280ms ease;
      }

      .bitmap-text {
        display: inline-flex;
        flex-wrap: nowrap;
        align-items: center;
        gap: 0;
        white-space: nowrap;
      }

      .bitmap-glyph {
        display: inline-block;
        width: calc(8px * var(--scale, 2));
        height: calc(8px * var(--scale, 2));
        background-image: url("assets/intro/charset.png");
        background-repeat: no-repeat;
        background-size: calc(128px * var(--scale, 2)) calc(128px * var(--scale, 2));
        image-rendering: pixelated;
      }

      .bitmap-space {
        display: inline-block;
        width: calc(6px * var(--scale, 2));
        height: calc(8px * var(--scale, 2));
      }

      .bitmap-red .bitmap-glyph {
        filter: hue-rotate(-18deg) saturate(150%) brightness(82%);
      }

      .bitmap-small {
        --scale: 2.8;
      }

      .bitmap-medium {
        --scale: 3.33;
      }

      .bitmap-large {
        --scale: 6.5;
      }

      .bitmap-supersmall {
        --scale: 2.03;
      }

      .legacy-hidden {
        position: absolute !important;
        width: 1px !important;
        height: 1px !important;
        padding: 0 !important;
        margin: -1px !important;
        overflow: hidden !important;
        clip: rect(0, 0, 0, 0) !important;
        white-space: nowrap !important;
        border: 0 !important;
      }

      @keyframes intro-slide {
        0% { transform: translateX(-130%); }
        100% { transform: translateX(330%); }
      }

      @keyframes intro-pulse {
        0%, 100% { opacity: 0.58; }
        50% { opacity: 0.9; }
      }

      @keyframes intro-blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }

      @keyframes intro-hover-border {
        0% { opacity: 0.6; }
        100% { opacity: 1; }
      }

      @media (max-width: 900px) {
        :root { --intro-ui-scale: 0.72; }
      }

      @media (max-width: 640px) {
        :root { --intro-ui-scale: 0.56; }
      }
    </style>
  </head>
  <body ondrop="gotdrop(event);" ondragover="event.preventDefault()">
    <div id="intro-overlay" role="dialog" aria-label="NZP Intro">
      <div id="intro-bg" aria-hidden="true"></div>
      <div id="intro-top-bar" aria-hidden="true"></div>
      <div id="intro-top-line" aria-hidden="true"></div>
      <div id="intro-bottom-bar" aria-hidden="true"></div>
      <div id="intro-bottom-line" aria-hidden="true"></div>

      <div id="intro-hud">
        <div id="intro-title-block">
          <h1 id="intro-title-main" class="bitmap-text bitmap-large" aria-label="NAZI ZOMBIES"></h1>
          <div id="intro-title-sub" class="bitmap-text bitmap-small bitmap-red" aria-label="ON SOLANA"></div>
        </div>

        <div id="intro-menu-column">
          <div id="intro-name-row" class="intro-menu-row intro-row-order-name" data-row-key="name" tabindex="0" role="button" aria-label="PLAYER NAME">

            <span id="intro-link-pump-text" class="intro-row-text bitmap-text bitmap-medium"></span>
          </a>
          <a id="intro-link-dex" class="intro-menu-row intro-row-order-dex" data-row-key="dex" href="https://dexscreener.com" target="_blank" rel="noopener noreferrer" aria-label="DEXSCREENER">
            <span id="intro-link-dex-text" class="intro-row-text bitmap-text bitmap-medium"></span>
          </a>
          <a id="intro-link-community" class="intro-menu-row intro-row-order-community" data-row-key="community" href="https://x.com/i/communities/2026792678101537150" target="_blank" rel="noopener noreferrer" aria-label="COMMUNITY">
            <span id="intro-link-community-text" class="intro-row-text bitmap-text bitmap-medium"></span>
          </a>
        </div>

        <div id="intro-status-wrap">
          <div id="intro-status-text" class="bitmap-text bitmap-small" aria-live="polite"></div>
          <div id="intro-progress-shell" aria-hidden="true">
            <div id="intro-progress-fill"></div>
          </div>
          <div id="intro-progress-percent" class="bitmap-text bitmap-small" aria-live="polite"></div>

        <div id="intro-cursor" aria-hidden="true"></div>

    <div class="emscripten legacy-hidden" id="status">Please allow/unblock our javascript to play.</div>
    <div id="dropzone" class="legacy-hidden" ondrop="gotdrop(event);" ondragover="event.preventDefault()" hidden="1">Drop Zone</div>
    <button type="button" onclick="begin()" class="legacy-hidden" id="begin" hidden="1">Click To Begin!</button>
    <div class="emscripten legacy-hidden">
      <progress value="0" max="100" id="progress" hidden="1"></progress>
    </div>

    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" hidden="1"></canvas>

    <script type="text/javascript">
      var ASSET_REV = "2026-02-25-bootfix1";
      function withRev(path) {
        return path + "?v=" + encodeURIComponent(ASSET_REV);
      }

      function renderBitmapText(target, text) {
        if (!target) {
          return;
        }
        target.textContent = "";
        var source = String(text || "").toUpperCase();
        for (var i = 0; i < source.length; i++) {
          var ch = source.charCodeAt(i);
          if (source[i] === " ") {
            var space = document.createElement("span");
            space.className = "bitmap-space";
            target.appendChild(space);
            continue;
          }
          if (ch < 0 || ch > 127) {
            ch = 63;
          }
          var col = ch & 15;
          var row = ch >> 4;
          var glyph = document.createElement("span");
          glyph.className = "bitmap-glyph";
          glyph.style.backgroundPosition = "calc(" + (-col * 8) + "px * var(--scale, 2)) calc(" + (-row * 8) + "px * var(--scale, 2))";
          target.appendChild(glyph);
        }
      }

      var IntroUI = {
        state: "preloading",
        hidden: false,
        handoffDone: false,
        handoffInFlight: false,
        engineReady: false,
        engineInitFailed: false,
        keyboardMode: false,
        hoverRow: "",
        focusRow: "",
        lastStatusText: "PRELOADING PACKAGES... 0%",
        rowOrder: ["name", "enter", "pump", "dex", "community"],
        rowDescriptions: {
          name: "Name that appears in-game and on the Scoreboard.",
          enter: "Launch into Nazi Zombies: Solana.",
          pump: "https://pump.fun",
          dex: "https://dexscreener.com",
          community: "https://x.com/i/communities/2026792678101537150"
        },
        rowEls: {},
        els: {},
        init: function() {
          this.els.overlay = document.getElementById("intro-overlay");
          this.els.input = document.getElementById("intro-name-input");
          this.els.enter = document.getElementById("intro-enter-btn");
          this.els.status = document.getElementById("intro-status-text");
          this.els.description = document.getElementById("intro-description-strip");
          this.els.bar = document.getElementById("intro-progress-fill");
          this.els.percent = document.getElementById("intro-progress-percent");
          this.els.shell = document.getElementById("intro-progress-shell");
          this.els.titleMain = document.getElementById("intro-title-main");
          this.els.titleSub = document.getElementById("intro-title-sub");
          this.els.nameRow = document.getElementById("intro-name-row");
          this.els.nameLabel = document.getElementById("intro-name-label");
          this.els.nameShell = document.getElementById("intro-name-shell");
          this.els.enterText = document.getElementById("intro-enter-text");
          this.els.linkPumpRow = document.getElementById("intro-link-pump");
          this.els.linkDexRow = document.getElementById("intro-link-dex");
          this.els.linkCommunityRow = document.getElementById("intro-link-community");
          this.els.linkPump = document.getElementById("intro-link-pump-text");
          this.els.linkDex = document.getElementById("intro-link-dex-text");
          this.els.linkCommunity = document.getElementById("intro-link-community-text");

          var ok = !!(
            this.els.overlay &&
            this.els.input &&
            this.els.enter &&
            this.els.status &&
            this.els.description &&
            this.els.bar &&
            this.els.percent &&
            this.els.shell &&
            this.els.nameRow &&
            this.els.linkPumpRow &&
            this.els.linkDexRow &&
            this.els.linkCommunityRow
          );
          if (!ok) {
            return false;
          }

          this.rowEls = {
            name: this.els.nameRow,
            enter: this.els.enter,
            pump: this.els.linkPumpRow,
            dex: this.els.linkDexRow,
            community: this.els.linkCommunityRow
          };

          renderBitmapText(this.els.titleMain, "NAZI ZOMBIES");
          renderBitmapText(this.els.titleSub, "ON SOLANA");
          renderBitmapText(this.els.nameLabel, "PLAYER NAME");
          renderBitmapText(this.els.enterText, "PRELOADING...");
          renderBitmapText(this.els.linkPump, "PUMP.FUN");
          renderBitmapText(this.els.linkDex, "DEXSCREENER");
          renderBitmapText(this.els.linkCommunity, "COMMUNITY");
          renderBitmapText(this.els.status, this.lastStatusText);
          renderBitmapText(this.els.percent, "0%");
          this.refreshDescription();
          this.bindRowEvents();
          return true;
        },
        bindRowEvents: function() {
          var self = this;
          Object.keys(this.rowEls).forEach(function(key) {
            var row = self.rowEls[key];
            if (!row) {
              return;
            }
            row.addEventListener("mouseenter", function() {
              self.keyboardMode = false;
              self.hoverRow = key;
              self.updateRowVisuals();
              self.refreshDescription();
            });
            row.addEventListener("mouseleave", function() {
              if (self.hoverRow === key) {
                self.hoverRow = "";
                self.updateRowVisuals();
                self.refreshDescription();
              }
            });
            row.addEventListener("focus", function() {
              self.focusRow = key;
              self.updateRowVisuals();
              self.refreshDescription();
            });
            row.addEventListener("blur", function() {
              if (!self.hoverRow && document.activeElement !== self.els.input) {
                self.focusRow = "";
              }
              self.updateRowVisuals();
              self.refreshDescription();
            });
          });

          this.els.nameRow.addEventListener("click", function() {
            self.keyboardMode = false;
            if (self.isRowEnabled("name")) {
              self.els.input.focus();
            }
          });
        },
        isRowEnabled: function(key) {
          if (key === "name" || key === "enter") {
            return this.state === "idle";
          }
          return true;
        },
        updateRowVisuals: function() {
          var activeKey = this.hoverRow || "";
          if (!activeKey) {
            if (document.activeElement === this.els.input) {
              activeKey = "name";
            } else if (this.keyboardMode && this.focusRow) {
              activeKey = this.focusRow;
            }
          }
          var self = this;
          Object.keys(this.rowEls).forEach(function(key) {
            var row = self.rowEls[key];
            if (!row) {
              return;
            }
            row.classList.toggle("is-active", key === activeKey);
            row.classList.toggle("is-disabled", !self.isRowEnabled(key));
          });
        },
        getCurrentDescription: function() {
          var source = "";
          if (this.hoverRow) {
            source = this.hoverRow;
          } else if (document.activeElement === this.els.input) {
            source = "name";
          } else if (this.keyboardMode && this.focusRow) {
            source = this.focusRow;
          }
          if (source && this.rowDescriptions[source]) {
            return this.rowDescriptions[source];
          }
          return "";
        },
        refreshDescription: function() {
          if (!this.els.description) {
            return;
          }
          renderBitmapText(this.els.description, this.getCurrentDescription());
        },
        setState: function(next) {
          this.state = next;
          if (this.els.overlay) {
            this.els.overlay.classList.toggle("intro-loading", next !== "idle");
          }
          if (this.els.input) {
            this.els.input.disabled = next !== "idle";
          }
          if (this.els.enter) {
            this.els.enter.disabled = next !== "idle";
          }
          if (this.els.enterText) {
            if (next === "idle") {
              renderBitmapText(this.els.enterText, this.engineInitFailed ? "RELOAD" : "ENTER");
            } else if (next === "engine_ready") {
              renderBitmapText(this.els.enterText, "LAUNCHING...");
            } else {
              renderBitmapText(this.els.enterText, "LOADING...");
            }
          }
          this.refreshNameCaret();
          this.updateRowVisuals();
          this.refreshDescription();
        },
        moveFocus: function(delta) {
          this.keyboardMode = true;
          var startIndex = this.rowOrder.indexOf(this.focusRow);
          if (startIndex < 0) {
            startIndex = delta > 0 ? -1 : 0;
          }
          for (var n = 0; n < this.rowOrder.length; n++) {
            startIndex = (startIndex + delta + this.rowOrder.length) % this.rowOrder.length;
            var key = this.rowOrder[startIndex];
            if (!this.isRowEnabled(key)) {
              continue;
            }
            this.focusRow = key;
            this.hoverRow = "";
            this.updateRowVisuals();
            this.refreshDescription();
            if (key === "name") {
              try {
                this.els.nameRow.focus({ preventScroll: true });
              } catch (_err) {
                this.els.nameRow.focus();
              }
            } else {
              try {
                this.rowEls[key].focus({ preventScroll: true });
              } catch (_err2) {
                this.rowEls[key].focus();
              }
            }
            return;
          }
        },
        activateFocused: function() {
          var key = this.focusRow;
          if (!key || !this.isRowEnabled(key)) {
            return;
          }
          if (key === "name") {
            this.els.input.focus();
            return;
          }
          if (key === "enter") {
            BootBridge.handleEnterAction();
            return;
          }
          var row = this.rowEls[key];
          if (row && typeof row.click === "function") {
            row.click();
          }
        },
        handleGlobalKeydown: function(ev) {
          if (ev.altKey || ev.ctrlKey || ev.metaKey) {
            return false;
          }
          if (document.activeElement === this.els.input) {
            return false;
          }
          if (ev.key === "ArrowDown") {
            ev.preventDefault();
            this.moveFocus(1);
            return true;
          }
          if (ev.key === "ArrowUp") {
            ev.preventDefault();
            this.moveFocus(-1);
            return true;
          }
          if (ev.key === "Enter" && this.keyboardMode) {
            ev.preventDefault();
            this.activateFocused();
            return true;
          }
          return false;
        },
        refreshNameCaret: function() {
          if (!this.els.nameShell || !this.els.input) {
            return;
          }
          var show = this.state === "idle" &&
            !this.els.input.value.trim().length &&
            document.activeElement !== this.els.input;
          this.els.nameShell.classList.toggle("show-select-caret", show);
        },
        setStatus: function(text, percent, indeterminate) {
          if (!this.els.status) {
            return;
          }
          this.lastStatusText = text || "";
          renderBitmapText(this.els.status, this.lastStatusText);
          this.refreshDescription();
          if (indeterminate) {
            this.els.shell.classList.add("indeterminate");
          } else {
            this.els.shell.classList.remove("indeterminate");
          }
          if (typeof percent === "number" && isFinite(percent)) {
            var value = Math.max(0, Math.min(100, percent));
            this.els.bar.style.width = value + "%";
            renderBitmapText(this.els.percent, Math.round(value) + "%");
          }
        },
        markEngineReady: function() {
          this.engineReady = true;
          this.tryHandoff();
        },
        markEngineInitFailed: function() {
          this.engineInitFailed = true;
          this.setState("idle");
          this.setStatus("ENGINE INIT FAILED. PRESS ENTER TO RELOAD.", 100, false);
        },
        tryHandoff: function() {
          if (this.handoffDone || this.handoffInFlight || !BootBridge.started || !BootPreload.isReady() || !this.engineReady) {
            return;
          }
          this.handoffInFlight = true;
          this.setState("engine_ready");
          this.setStatus("LAUNCHING...", 100, false);
          var self = this;
          var canvas = document.getElementById("canvas");
          if (canvas) {
            canvas.hidden = false;
          }

          function isCanvasNonBlack() {
            try {
              if (!canvas) {
                return false;
              }
              var w = canvas.width || canvas.clientWidth || 0;
              var h = canvas.height || canvas.clientHeight || 0;
              if (!w || !h) {
                return false;
              }
              var probe = document.createElement("canvas");
              probe.width = 16;
              probe.height = 16;
              var ctx = probe.getContext("2d", { willReadFrequently: true });
              if (!ctx) {
                return false;
              }
              ctx.drawImage(canvas, 0, 0, 16, 16);
              var px = ctx.getImageData(0, 0, 16, 16).data;
              var lit = 0;
              for (var i = 0; i < px.length; i += 4) {
                var a = px[i + 3];
                var rgb = px[i] + px[i + 1] + px[i + 2];
                if (a > 0 && rgb > 18) {
                  lit++;
                  if (lit >= 6) {
                    return true;
                  }
                }
              }
              return false;
            } catch (_e) {
              return false;
            }
          }

          var attempts = 0;
          function waitForVisibleFrame() {
            attempts++;
            requestAnimationFrame(function() {
              requestAnimationFrame(function() {
                if (isCanvasNonBlack()) {
                  self.handoffDone = true;
                  self.handoffInFlight = false;
                  self.hide();
                  return;
                }
                if (attempts < 120) {
                  waitForVisibleFrame();
                  return;
                }
                self.handoffInFlight = false;
                self.engineInitFailed = true;
                self.setState("idle");
                self.setStatus("RENDER STALLED. PRESS ENTER TO RELOAD.", 100, false);
              });
            });
          }
          waitForVisibleFrame();
        },
        hide: function() {
          if (this.hidden || !this.els.overlay) {
            return;
          }
          this.hidden = true;
          this.els.overlay.classList.add("intro-handoff");
          document.getElementById("canvas").hidden = false;
        }
      };

      var NameStore = {
        key: "nzp_player_name",
        sanitize: function(raw) {
          var value = String(raw || "");
          value = value.replace(/[\u0000-\u001F\u007F"'`\\]/g, "").trim();
          if (value.length > 24) {
            value = value.slice(0, 24);
          }
          return value;
        },
        sanitizeForLaunch: function(raw) {
          var value = this.sanitize(raw);
          if (!value.length) {
            return "Survivor";
          }
          return value;
        },
        load: function() {
          try {
            return this.sanitize(localStorage.getItem(this.key));
          } catch (_err) {
            return "";
          }
        },
        save: function(name) {
          try {
            if (name && name.length) {
              localStorage.setItem(this.key, name);
            } else {
              localStorage.removeItem(this.key);
            }
          } catch (_err) {
          }
        }
      };

      var BootBridge = {
        started: false,
        pendingStart: false,
        ensureArgs: function(name) {
          var current = Array.isArray(Module.arguments) ? Module.arguments.slice() : [];
          var next = [];
          for (var i = 0; i < current.length; i++) {
            if (current[i] === "+name") {
              i += 1;
              continue;
            }
            next.push(current[i]);
          }
          next.push("+name");
          next.push(name);
          Module.arguments = next;
        },
        startEngineNow: function() {
          if (this.started || Module.began) {
            return;
          }
          this.started = true;
          this.pendingStart = false;
          var typedName = NameStore.sanitize(IntroUI.els.input.value);
          var launchName = NameStore.sanitizeForLaunch(typedName);
          IntroUI.els.input.value = typedName;
          NameStore.save(typedName);
          this.ensureArgs(launchName);
          IntroUI.setState("loading");
          IntroUI.setStatus("INITIALIZING ENGINE...", 100, true);
          begin();
        },
        handleEnterAction: function() {
          if (IntroUI.engineInitFailed) {
            window.location.reload();
            return;
          }
          if (this.started || Module.began) {
            return;
          }
          if (!BootPreload.isReady()) {
            this.pendingStart = true;
            IntroUI.setStatus("PRELOADING PACKAGES... " + Math.round(BootPreload.progress) + "%", BootPreload.progress, false);
            return;
          }
          this.startEngineNow();
        },
        onPreloadReady: function() {
          IntroUI.setState("idle");
          IntroUI.setStatus("PACKAGES READY. PRESS ENTER.", 100, false);
          if (IntroUI.els.input) {
            IntroUI.refreshNameCaret();
          }
          if (this.pendingStart) {
            this.startEngineNow();
          }
        }
      };

      var BootPreload = {
        state: "idle",
        progress: 0,
        started: false,
        urls: {
          fmf: withRev("default.fmf"),
          game: withRev("nzp/game.pk3"),
          progs: withRev("nzp/progs.pk3")
        },
        expectedBytes: {
          fmf: 96,
          game: 93481452,
          progs: 478925
        },
        loadedByKey: {},
        buffers: {},
        totalExpected: 0,
        isReady: function() {
          return this.state === "ready";
        },
        recalcProgress: function() {
          var loaded = 0;
          var keys = Object.keys(this.expectedBytes);
          for (var i = 0; i < keys.length; i++) {
            var key = keys[i];
            loaded += this.loadedByKey[key] || 0;
          }
          this.progress = this.totalExpected > 0 ? (loaded / this.totalExpected) * 100 : 0;
          IntroUI.setStatus("PRELOADING PACKAGES... " + Math.round(this.progress) + "%", this.progress, false);
        },
        fetchWithProgress: async function(key, url) {
          var response = await fetch(url, { credentials: "same-origin", cache: "force-cache" });
          if (!response.ok) {
            throw new Error("Failed preload: " + key);
          }
          var reader = response.body && response.body.getReader ? response.body.getReader() : null;
          if (!reader) {
            var whole = await response.arrayBuffer();
            this.loadedByKey[key] = whole.byteLength;
            this.recalcProgress();
            return whole;
          }
          var chunks = [];
          var received = 0;
          while (true) {
            var part = await reader.read();
            if (part.done) {
              break;
            }
            chunks.push(part.value);
            received += part.value.byteLength;
            this.loadedByKey[key] = Math.max(received, this.loadedByKey[key] || 0);
            this.recalcProgress();
          }
          var total = 0;
          for (var i = 0; i < chunks.length; i++) {
            total += chunks[i].byteLength;
          }
          var merged = new Uint8Array(total);
          var offset = 0;
          for (var j = 0; j < chunks.length; j++) {
            merged.set(chunks[j], offset);
            offset += chunks[j].byteLength;
          }
          this.loadedByKey[key] = total;
          this.recalcProgress();
          return merged.buffer;
        },
        start: async function() {
          if (this.started) {
            return;
          }
          this.started = true;
          this.state = "preloading";
          this.totalExpected = this.expectedBytes.fmf + this.expectedBytes.game + this.expectedBytes.progs;
          this.loadedByKey = { fmf: 0, game: 0, progs: 0 };
          IntroUI.setState("loading");
          IntroUI.setStatus("PRELOADING PACKAGES... 0%", 0, false);

          try {
            var results = await Promise.all([
              this.fetchWithProgress("fmf", this.urls.fmf),
              this.fetchWithProgress("game", this.urls.game),
              this.fetchWithProgress("progs", this.urls.progs)
            ]);

            this.buffers.fmf = results[0];
            this.buffers.game = results[1];
            this.buffers.progs = results[2];

            Module.files["default.fmf"] = this.buffers.fmf;
            Module.files["nzp/game.pk3"] = this.buffers.game;
            Module.files["nzp/progs.pk3"] = this.buffers.progs;

            this.progress = 100;
            this.state = "ready";
            IntroUI.setStatus("PACKAGES READY. PRESS ENTER.", 100, false);
            BootBridge.onPreloadReady();
          } catch (err) {
            this.state = "failed";
            console.error(err);
            IntroUI.setStatus("PRELOAD FAILED. RETRYING...", this.progress, false);
            var self = this;
            setTimeout(function() {
              self.started = false;
              self.start();
            }, 1200);
          }
        }
      };

      var Module = {
        files: {
          "default.fmf": withRev("default.fmf"),
          "nzp/game.pk3": withRev("nzp/game.pk3"),
          "nzp/progs.pk3": withRev("nzp/progs.pk3")
        },
        locateFile: function(path) {
          if (path === "ftewebgl.wasm") {
            return withRev(path);
          }
          return path;
        },
        print: function(msg) {
          console.log(msg);
        },
        printErr: function(text) {
          console.log(text);
        },
        canvas: document.getElementById("canvas"),
        setStatus: function(text) {
          if (Module.setStatus.interval) {
            clearInterval(Module.setStatus.interval);
          }
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var statusElement = document.getElementById("status");
          var progressElement = document.getElementById("progress");
          var percent = null;
          var indeterminate = true;

          if (m) {
            text = m[1].trim();
            var v = parseFloat(m[2]);
            var max = parseFloat(m[4]);
            progressElement.value = v;
            progressElement.max = max;
            progressElement.hidden = false;
            if (max > 0) {
              percent = (v / max) * 100;
              indeterminate = false;
            }
          } else {
            progressElement.value = null;
            progressElement.max = null;
            progressElement.hidden = true;
          }

          statusElement.innerHTML = text;
          statusElement.hidden = text.length === 0;

          if (BootBridge.started && !IntroUI.handoffDone) {
            IntroUI.setState("loading");
            IntroUI.setStatus((text || "INITIALIZING ENGINE...").toUpperCase(), typeof percent === "number" ? percent : 100, indeterminate);
          }
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")" : "All downloads complete.");
        },
        postRun: [
          function() {
            if (Module["sched"] === undefined) {
              IntroUI.markEngineInitFailed();
              return;
            }
            IntroUI.markEngineReady();
            setTimeout(function() {
              if (!IntroUI.handoffDone) {
                IntroUI.tryHandoff();
              }
            }, 2500);
          }
        ]
      };

      function begin() {
        if (Module.began) {
          return;
        }
        Module.began = true;
        document.getElementById("dropzone").hidden = true;
        document.getElementById("begin").hidden = true;
        Module.setStatus("Initializing engine...");

        var s = document.createElement("script");
        s.setAttribute("src", withRev("ftewebgl.js"));
        s.setAttribute("type", "text/javascript");
        s.setAttribute("charset", "utf-8");
        s.addEventListener("error", function() {
          alert("Unable to download engine javascript");
          Module.setStatus("Unable to download engine javascript");
        }, false);
        document.head.appendChild(s);
      }

      function fixupfilepath(fname, path) {
        if (path != "") {
          return path + fname;
        }
        var ext = fname.substr(fname.lastIndexOf(".") + 1);
        if (ext == "fmf" || ext == "kpf") {
          return fname;
        }
        if (ext == "bsp" || ext == "map" || ext == "lit" || ext == "lux") {
          return "id1/maps/" + fname;
        }
        return "id1/" + fname;
      }

      function showfiles() {
        if (Module.began) {
          return;
        }
        Module.setStatus("");
        document.getElementById("dropzone").hidden = false;
        document.getElementById("begin").hidden = false;
        var nt = "Drag gamedirs or individual package files here to make them available!<br/>Active Files:<br/><pre>";
        var keys = Object.keys(Module.files);
        for (var i = 0; i < keys.length; i++) {
          if (Module.files[keys[i]] instanceof ArrayBuffer) {
            var sz = Module.files[keys[i]].byteLength;
            if (sz > 512 * 1024) {
              sz = (sz / (1024 * 1024)) + "mb";
            } else if (sz > 512) {
              sz = (sz / 1024) + "kb";
            } else {
              sz = sz + " bytes";
            }
            nt += "    " + keys[i] + " (" + sz + ")<br/>";
          } else {
            nt += "    " + keys[i] + "<br/>";
          }
        }
        nt += "</pre>(" + keys.length + " files)";
        document.getElementById("dropzone").innerHTML = nt;
      }

      function scanfiles(item, path) {
        if (item.isFile) {
          item.file(function(f) {
            var n = fixupfilepath(f.name, path);
            Module.files[n] = f.arrayBuffer();
            Module.files[n].then(function(buf) {
              Module.files[n] = buf;
              showfiles();
            });
          });
        } else if (item.isDirectory) {
          var dirReader = item.createReader();
          dirReader.readEntries(function(entries) {
            for (var i = 0; i < entries.length; i++) {
              scanfiles(entries[i], path + item.name + "/");
            }
          });
        }
      }

      function gotdrop(ev) {
        ev.preventDefault();
        for (var i = 0; i < ev.dataTransfer.items.length; i++) {
          if (ev.dataTransfer.items[i].webkitGetAsEntry) {
            var d = ev.dataTransfer.items[i].webkitGetAsEntry();
            if (d) {
              scanfiles(d, "");
            }
          } else if (ev.dataTransfer.items[i].kind === "file") {
            var f = ev.dataTransfer.items[i].getAsFile();
            var n = fixupfilepath(f.name);
            Module.files[n] = f.arrayBuffer();
            Module.files[n].then(function(buf) {
              Module.files[n] = buf;
              showfiles();
            });
          }
        }
        showfiles();
      }

      (function initIntroBoot() {
        if (!IntroUI.init()) {
          showfiles();
          return;
        }

        IntroUI.els.input.value = NameStore.load();
        BootPreload.start();
        IntroUI.els.enter.addEventListener("click", function() {
          BootBridge.handleEnterAction();
        });
        IntroUI.els.input.addEventListener("input", function() {
          IntroUI.refreshNameCaret();
        });
        IntroUI.els.input.addEventListener("focus", function() {
          IntroUI.refreshNameCaret();
        });
        IntroUI.els.input.addEventListener("blur", function() {
          IntroUI.refreshNameCaret();
        });
        IntroUI.els.input.addEventListener("keydown", function(ev) {
          if (ev.key === "Enter") {
            ev.preventDefault();
            BootBridge.handleEnterAction();
          }
        });
        document.addEventListener("keydown", function(ev) {
          IntroUI.handleGlobalKeydown(ev);
        });
        IntroUI.refreshNameCaret();
        IntroUI.refreshDescription();
        IntroUI.updateRowVisuals();

        if (window.location.hash != "") {
          BootBridge.pendingStart = true;
          requestAnimationFrame(function() {
            setTimeout(function() {
              BootBridge.handleEnterAction();
            }, 60);
          });
        }
      })();
    </script>
