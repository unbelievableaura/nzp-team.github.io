<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta content="Nazi Zombies: Portable" property="og:title" />
    <meta content="Call of Duty: Zombies de-make, now in your browser via WebGL!" property="og:description" />
    <meta content="https://nzp-team.github.io/latest/game.html" property="og:url" />
    <meta content="https://nzp-team.github.io/latest/nzportable.ico" property="og:image" />
    <meta content="#6e0d00" data-react-helmet="true" name="theme-color" />
    <title>NZ: Portable</title>
    <link rel="icon" href="nzportable.ico">
    <style>
      :root {
        --menu-text: #d4d5d8;
        --menu-line: rgba(118, 123, 131, 0.82);
        --menu-red: #a91a1a;
        --menu-red-dark: #6f1212;
        --menu-panel-shadow: rgba(0, 0, 0, 0.66);
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: #000;
        color: var(--menu-text);
        font-family: "Lucida Console", "Courier New", monospace;
      }

      .emscripten {
        padding-right: 0;
        margin-left: auto;
        margin-right: auto;
        display: block;
      }

      div.emscripten {
        text-align: center;
        padding: 0;
        margin: 0;
      }

      canvas.emscripten {
        border: 0 none;
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
        background: #000;
      }

      #canvas[hidden] {
        display: none;
      }

      #intro-overlay {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: block;
        background: #040404;
      }

      #intro-bg {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(0deg, rgba(0, 0, 0, 0.64), rgba(0, 0, 0, 0.42)),
          url("assets/intro/bg.png");
        background-size: cover;
        background-position: center;
        image-rendering: pixelated;
      }

      #intro-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.03) 0,
          rgba(255, 255, 255, 0.03) 1px,
          rgba(0, 0, 0, 0.0) 2px,
          rgba(0, 0, 0, 0.0) 4px
        );
      }

      #intro-panel {
        position: absolute;
        left: 0;
        right: 0;
        top: 24px;
        bottom: 24px;
        width: min(1040px, calc(100vw - 36px));
        margin: 0 auto;
        border-top: 3px solid var(--menu-line);
        border-bottom: 3px solid var(--menu-line);
        background: linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.74) 0%,
          rgba(0, 0, 0, 0.55) 52%,
          rgba(0, 0, 0, 0.35) 100%
        );
        box-shadow:
          inset 0 0 0 2px rgba(0, 0, 0, 0.6),
          0 0 36px var(--menu-panel-shadow);
        padding: 26px 24px 28px;
      }

      #intro-panel::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.03) 0%,
          rgba(255, 255, 255, 0) 15%,
          rgba(255, 255, 255, 0) 85%,
          rgba(255, 255, 255, 0.02) 100%
        );
      }

      .intro-row-line {
        width: 100%;
        height: 3px;
        background: url("assets/intro/line.png") center/contain repeat-x;
        opacity: 0.9;
      }

      #intro-logo {
        width: clamp(96px, 12vw, 140px);
        image-rendering: pixelated;
        filter: drop-shadow(0 0 8px rgba(0, 0, 0, 0.85));
      }

      #intro-heading {
        margin-top: 10px;
        display: flex;
        align-items: flex-end;
        gap: 14px;
        flex-wrap: wrap;
      }

      #intro-title-main {
        margin: 0;
        min-height: clamp(32px, 6.2vw, 60px);
      }

      #intro-title-sub {
        margin-top: 0;
        min-height: clamp(14px, 2.3vw, 22px);
      }

      #intro-form {
        margin-top: 22px;
        width: min(900px, 100%);
        border-top: 2px solid rgba(66, 66, 66, 0.85);
        padding-top: 20px;
      }

      #intro-name-row {
        display: grid;
        grid-template-columns: minmax(160px, 34%) 1fr;
        align-items: center;
        gap: 16px;
      }

      #intro-name-shell {
        position: relative;
      }

      #intro-name-label {
        min-height: clamp(16px, 2.1vw, 24px);
      }

      #intro-name-input {
        height: clamp(40px, 5.2vw, 58px);
        border: 2px solid #2e3138;
        background: rgba(0, 0, 0, 0.78);
        color: var(--menu-text);
        padding: 0 12px;
        font-family: "Lucida Console", "Courier New", monospace;
        font-size: clamp(16px, 1.95vw, 32px);
        letter-spacing: 0.4px;
        outline: none;
        width: 100%;
      }

      #intro-name-input:focus {
        border-color: #666d77;
        box-shadow: 0 0 0 1px rgba(73, 73, 73, 0.9);
      }

      #intro-name-caret {
        position: absolute;
        left: 14px;
        top: 50%;
        width: 2px;
        height: 64%;
        transform: translateY(-50%);
        background: #cfd2d7;
        opacity: 0;
        pointer-events: none;
      }

      #intro-name-shell.show-select-caret #intro-name-caret {
        opacity: 1;
        animation: intro-blink 1s steps(1, end) infinite;
      }

      #intro-controls {
        margin-top: 16px;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 16px;
      }

      #intro-ready {
        min-height: 16px;
      }

      #intro-enter-btn {
        min-width: 230px;
        height: 48px;
        border: 2px solid rgba(118, 26, 26, 0.95);
        border-right-width: 3px;
        background:
          linear-gradient(180deg, rgba(132, 24, 24, 0.95), rgba(80, 12, 12, 0.95)),
          rgba(80, 12, 12, 0.95);
        color: #ece9e9;
        font-family: inherit;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        transition: filter 120ms linear, border-color 120ms linear;
      }

      #intro-enter-btn:hover:not(:disabled),
      #intro-enter-btn:focus-visible:not(:disabled) {
        border-color: #c23a3a;
        filter: brightness(1.14);
      }

      #intro-enter-btn:disabled {
        opacity: 0.55;
        cursor: default;
      }

      #intro-status {
        margin-top: 18px;
        max-width: 920px;
      }

      #intro-status-text {
        min-height: 16px;
      }

      #intro-progress-shell {
        margin-top: 8px;
        height: 14px;
        border: 1px solid #464c53;
        background: rgba(3, 3, 3, 0.9);
        position: relative;
        overflow: hidden;
      }

      #intro-progress-fill {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--menu-red-dark), var(--menu-red));
        transition: width 110ms linear;
      }

      #intro-progress-shell.indeterminate #intro-progress-fill {
        width: 35%;
        animation: intro-slide 1.2s linear infinite;
      }

      #intro-progress-percent {
        margin-top: 6px;
        text-align: right;
        min-height: 12px;
      }

      #intro-cursor {
        position: absolute;
        right: 20px;
        bottom: 16px;
        width: 42px;
        height: 42px;
        background: url("assets/intro/hilight.png") center/contain no-repeat;
        opacity: 0.75;
        animation: intro-pulse 1.8s ease-in-out infinite;
      }

      #intro-overlay.intro-loading #intro-name-row,
      #intro-overlay.intro-loading #intro-controls {
        opacity: 0.56;
        pointer-events: none;
      }

      #intro-overlay.intro-handoff {
        opacity: 0;
        visibility: hidden;
        transition: opacity 280ms ease, visibility 280ms ease;
      }

      .bitmap-text {
        display: inline-flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0;
      }

      .bitmap-glyph {
        display: inline-block;
        width: calc(8px * var(--scale, 2));
        height: calc(8px * var(--scale, 2));
        background-image: url("assets/intro/charset.png");
        background-repeat: no-repeat;
        background-size: calc(128px * var(--scale, 2)) calc(128px * var(--scale, 2));
        image-rendering: pixelated;
      }

      .bitmap-space {
        display: inline-block;
        width: calc(6px * var(--scale, 2));
        height: calc(8px * var(--scale, 2));
      }

      .bitmap-red .bitmap-glyph {
        filter: hue-rotate(-18deg) saturate(150%) brightness(82%);
      }

      .bitmap-small {
        --scale: 1.25;
      }

      .bitmap-medium {
        --scale: 1.65;
      }

      .bitmap-large {
        --scale: 2.7;
      }

      .legacy-hidden {
        position: absolute !important;
        width: 1px !important;
        height: 1px !important;
        padding: 0 !important;
        margin: -1px !important;
        overflow: hidden !important;
        clip: rect(0, 0, 0, 0) !important;
        white-space: nowrap !important;
        border: 0 !important;
      }

      @keyframes intro-slide {
        0% { transform: translateX(-130%); }
        100% { transform: translateX(330%); }
      }

      @keyframes intro-pulse {
        0%, 100% { opacity: 0.58; }
        50% { opacity: 0.9; }
      }

      @keyframes intro-blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }

      @media (max-width: 740px) {
        #intro-panel {
          width: calc(100vw - 16px);
          top: 8px;
          bottom: 8px;
          padding: 14px 10px 16px;
        }

        #intro-name-row {
          grid-template-columns: 1fr;
          gap: 6px;
        }

        #intro-controls {
          grid-template-columns: 1fr;
          align-items: start;
        }

        #intro-enter-btn {
          width: 100%;
          min-width: 0;
        }

        .bitmap-large {
          --scale: 2.0;
        }

        .bitmap-medium {
          --scale: 1.35;
        }
      }
    </style>
  </head>
  <body ondrop="gotdrop(event);" ondragover="event.preventDefault()">
    <div id="intro-overlay" role="dialog" aria-label="NZP Intro">
      <div id="intro-bg" aria-hidden="true"></div>
      <section id="intro-panel">
        <div class="intro-row-line"></div>
        <img id="intro-logo" src="assets/intro/logo.png" alt="NZP logo">
        <div id="intro-heading">
          <h1 id="intro-title-main" class="bitmap-text bitmap-large" aria-label="NAZI ZOMBIES"></h1>
          <div id="intro-title-sub" class="bitmap-text bitmap-medium bitmap-red" aria-label="ON SOLANA"></div>
        </div>
        <div class="intro-row-line"></div>

        <div id="intro-form">
          <div id="intro-name-row">
            <label id="intro-name-label" for="intro-name-input" class="bitmap-text bitmap-medium" aria-label="PLAYER NAME"></label>
            <div id="intro-name-shell">
              <input id="intro-name-input" type="text" maxlength="24" autocomplete="name" spellcheck="false" value="">
              <span id="intro-name-caret" aria-hidden="true"></span>
            </div>
          </div>

          <div id="intro-controls">
            <div id="intro-ready" class="bitmap-text bitmap-small" aria-label="PROFILE READY"></div>
            <button type="button" id="intro-enter-btn" aria-label="ENTER"><span id="intro-enter-text" class="bitmap-text bitmap-medium"></span></button>
          </div>

          <div id="intro-status">
            <div id="intro-status-text" class="bitmap-text bitmap-small" aria-live="polite"></div>
            <div id="intro-progress-shell" aria-hidden="true">
              <div id="intro-progress-fill"></div>
            </div>
            <div id="intro-progress-percent" class="bitmap-text bitmap-small" aria-live="polite"></div>
          </div>
        </div>

        <div id="intro-cursor" aria-hidden="true"></div>
      </section>
    </div>

    <div class="emscripten legacy-hidden" id="status">Please allow/unblock our javascript to play.</div>
    <div id="dropzone" class="legacy-hidden" ondrop="gotdrop(event);" ondragover="event.preventDefault()" hidden="1">Drop Zone</div>
    <button type="button" onclick="begin()" class="legacy-hidden" id="begin" hidden="1">Click To Begin!</button>
    <div class="emscripten legacy-hidden">
      <progress value="0" max="100" id="progress" hidden="1"></progress>
    </div>

    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" hidden="1"></canvas>

    <script type="text/javascript">
      var ASSET_REV = "2026-02-25-bootfix1";
      function withRev(path) {
        return path + "?v=" + encodeURIComponent(ASSET_REV);
      }

      function renderBitmapText(target, text) {
        if (!target) {
          return;
        }
        target.textContent = "";
        var source = String(text || "").toUpperCase();
        for (var i = 0; i < source.length; i++) {
          var ch = source.charCodeAt(i);
          if (source[i] === " ") {
            var space = document.createElement("span");
            space.className = "bitmap-space";
            target.appendChild(space);
            continue;
          }
          if (ch < 0 || ch > 127) {
            ch = 63;
          }
          var col = ch & 15;
          var row = ch >> 4;
          var glyph = document.createElement("span");
          glyph.className = "bitmap-glyph";
          glyph.style.backgroundPosition = "calc(" + (-col * 8) + "px * var(--scale, 2)) calc(" + (-row * 8) + "px * var(--scale, 2))";
          target.appendChild(glyph);
        }
      }

      var IntroUI = {
        state: "preloading",
        hidden: false,
        handoffDone: false,
        handoffInFlight: false,
        engineReady: false,
        engineInitFailed: false,
        els: {},
        init: function() {
          this.els.overlay = document.getElementById("intro-overlay");
          this.els.input = document.getElementById("intro-name-input");
          this.els.enter = document.getElementById("intro-enter-btn");
          this.els.status = document.getElementById("intro-status-text");
          this.els.bar = document.getElementById("intro-progress-fill");
          this.els.percent = document.getElementById("intro-progress-percent");
          this.els.shell = document.getElementById("intro-progress-shell");
          this.els.titleMain = document.getElementById("intro-title-main");
          this.els.titleSub = document.getElementById("intro-title-sub");
          this.els.nameLabel = document.getElementById("intro-name-label");
          this.els.nameShell = document.getElementById("intro-name-shell");
          this.els.ready = document.getElementById("intro-ready");
          this.els.enterText = document.getElementById("intro-enter-text");
          var ok = !!(this.els.overlay && this.els.input && this.els.enter && this.els.status && this.els.bar && this.els.percent && this.els.shell);
          if (ok) {
            renderBitmapText(this.els.titleMain, "NAZI ZOMBIES");
            renderBitmapText(this.els.titleSub, "ON SOLANA");
            renderBitmapText(this.els.nameLabel, "PLAYER NAME");
            renderBitmapText(this.els.ready, "PROFILE READY");
            renderBitmapText(this.els.enterText, "PRELOADING...");
            renderBitmapText(this.els.status, "PRELOADING PACKAGES... 0%");
            renderBitmapText(this.els.percent, "0%");
          }
          return ok;
        },
        setState: function(next) {
          this.state = next;
          if (this.els.overlay) {
            this.els.overlay.classList.toggle("intro-loading", next !== "idle");
          }
          if (this.els.input) {
            this.els.input.disabled = next !== "idle";
          }
          if (this.els.enter) {
            this.els.enter.disabled = next !== "idle";
          }
          if (this.els.enterText) {
            if (next === "idle") {
              renderBitmapText(this.els.enterText, "ENTER");
            } else if (next === "engine_ready") {
              renderBitmapText(this.els.enterText, "LAUNCHING...");
            } else {
              renderBitmapText(this.els.enterText, "LOADING...");
            }
          }
          this.refreshNameCaret();
        },
        refreshNameCaret: function() {
          if (!this.els.nameShell || !this.els.input) {
            return;
          }
          var show = this.state === "idle" &&
            !this.els.input.value.trim().length &&
            document.activeElement !== this.els.input;
          this.els.nameShell.classList.toggle("show-select-caret", show);
        },
        setStatus: function(text, percent, indeterminate) {
          if (!this.els.status) {
            return;
          }
          renderBitmapText(this.els.status, text || "");
          if (indeterminate) {
            this.els.shell.classList.add("indeterminate");
          } else {
            this.els.shell.classList.remove("indeterminate");
          }
          if (typeof percent === "number" && isFinite(percent)) {
            var value = Math.max(0, Math.min(100, percent));
            this.els.bar.style.width = value + "%";
            renderBitmapText(this.els.percent, Math.round(value) + "%");
          }
        },
        markEngineReady: function() {
          this.engineReady = true;
          this.tryHandoff();
        },
        markEngineInitFailed: function() {
          this.engineInitFailed = true;
          this.setState("idle");
          this.setStatus("ENGINE INIT FAILED. PRESS ENTER TO RELOAD.", 100, false);
          if (this.els.enterText) {
            renderBitmapText(this.els.enterText, "RELOAD");
          }
        },
        tryHandoff: function() {
          if (this.handoffDone || this.handoffInFlight || !BootBridge.started || !BootPreload.isReady() || !this.engineReady) {
            return;
          }
          this.handoffInFlight = true;
          this.setState("engine_ready");
          this.setStatus("LAUNCHING...", 100, false);
          var self = this;
          var canvas = document.getElementById("canvas");
          if (canvas) {
            canvas.hidden = false;
          }

          function isCanvasNonBlack() {
            try {
              if (!canvas) {
                return false;
              }
              var w = canvas.width || canvas.clientWidth || 0;
              var h = canvas.height || canvas.clientHeight || 0;
              if (!w || !h) {
                return false;
              }
              var probe = document.createElement("canvas");
              probe.width = 16;
              probe.height = 16;
              var ctx = probe.getContext("2d", { willReadFrequently: true });
              if (!ctx) {
                return false;
              }
              ctx.drawImage(canvas, 0, 0, 16, 16);
              var px = ctx.getImageData(0, 0, 16, 16).data;
              var lit = 0;
              for (var i = 0; i < px.length; i += 4) {
                var a = px[i + 3];
                var rgb = px[i] + px[i + 1] + px[i + 2];
                if (a > 0 && rgb > 18) {
                  lit++;
                  if (lit >= 6) {
                    return true;
                  }
                }
              }
              return false;
            } catch (_e) {
              return false;
            }
          }

          var attempts = 0;
          function waitForVisibleFrame() {
            attempts++;
            requestAnimationFrame(function() {
              requestAnimationFrame(function() {
                if (isCanvasNonBlack()) {
                  self.handoffDone = true;
                  self.handoffInFlight = false;
                  self.hide();
                  return;
                }
                if (attempts < 120) {
                  waitForVisibleFrame();
                  return;
                }
                // Give clear recovery action instead of dropping to black forever.
                self.handoffInFlight = false;
                self.engineInitFailed = true;
                self.setState("idle");
                self.setStatus("RENDER STALLED. PRESS ENTER TO RELOAD.", 100, false);
                if (self.els.enterText) {
                  renderBitmapText(self.els.enterText, "RELOAD");
                }
              });
            });
          }
          waitForVisibleFrame();
        },
        hide: function() {
          if (this.hidden || !this.els.overlay) {
            return;
          }
          this.hidden = true;
          this.els.overlay.classList.add("intro-handoff");
          document.getElementById("canvas").hidden = false;
        }
      };

      var NameStore = {
        key: "nzp_player_name",
        sanitize: function(raw) {
          var value = String(raw || "");
          value = value.replace(/[\u0000-\u001F\u007F"'`\\]/g, "").trim();
          if (value.length > 24) {
            value = value.slice(0, 24);
          }
          return value;
        },
        sanitizeForLaunch: function(raw) {
          var value = this.sanitize(raw);
          if (!value.length) {
            return "Survivor";
          }
          return value;
        },
        load: function() {
          try {
            return this.sanitize(localStorage.getItem(this.key));
          } catch (_err) {
            return "";
          }
        },
        save: function(name) {
          try {
            if (name && name.length) {
              localStorage.setItem(this.key, name);
            } else {
              localStorage.removeItem(this.key);
            }
          } catch (_err) {
          }
        }
      };

      var BootBridge = {
        started: false,
        pendingStart: false,
        ensureArgs: function(name) {
          var current = Array.isArray(Module.arguments) ? Module.arguments.slice() : [];
          var next = [];
          for (var i = 0; i < current.length; i++) {
            if (current[i] === "+name") {
              i += 1;
              continue;
            }
            next.push(current[i]);
          }
          next.push("+name");
          next.push(name);
          Module.arguments = next;
        },
        startEngineNow: function() {
          if (this.started || Module.began) {
            return;
          }
          this.started = true;
          this.pendingStart = false;
          var typedName = NameStore.sanitize(IntroUI.els.input.value);
          var launchName = NameStore.sanitizeForLaunch(typedName);
          IntroUI.els.input.value = typedName;
          NameStore.save(typedName);
          this.ensureArgs(launchName);
          IntroUI.setState("loading");
          IntroUI.setStatus("INITIALIZING ENGINE...", 100, true);
          begin();
        },
        handleEnterAction: function() {
          if (IntroUI.engineInitFailed) {
            window.location.reload();
            return;
          }
          if (this.started || Module.began) {
            return;
          }
          if (!BootPreload.isReady()) {
            this.pendingStart = true;
            IntroUI.setStatus("PRELOADING PACKAGES... " + Math.round(BootPreload.progress) + "%", BootPreload.progress, false);
            return;
          }
          this.startEngineNow();
        },
        onPreloadReady: function() {
          IntroUI.setState("idle");
          IntroUI.setStatus("PACKAGES READY. PRESS ENTER.", 100, false);
          if (IntroUI.els.input) {
            IntroUI.refreshNameCaret();
          }
          if (this.pendingStart) {
            this.startEngineNow();
          }
        }
      };

      var BootPreload = {
        state: "idle",
        progress: 0,
        started: false,
        urls: {
          fmf: withRev("default.fmf"),
          game: withRev("nzp/game.pk3"),
          progs: withRev("nzp/progs.pk3")
        },
        expectedBytes: {
          fmf: 96,
          game: 93481452,
          progs: 478925
        },
        loadedByKey: {},
        buffers: {},
        totalExpected: 0,
        isReady: function() {
          return this.state === "ready";
        },
        recalcProgress: function() {
          var loaded = 0;
          var keys = Object.keys(this.expectedBytes);
          for (var i = 0; i < keys.length; i++) {
            var key = keys[i];
            loaded += this.loadedByKey[key] || 0;
          }
          this.progress = this.totalExpected > 0 ? (loaded / this.totalExpected) * 100 : 0;
          IntroUI.setStatus("PRELOADING PACKAGES... " + Math.round(this.progress) + "%", this.progress, false);
        },
        fetchWithProgress: async function(key, url) {
          var response = await fetch(url, { credentials: "same-origin", cache: "force-cache" });
          if (!response.ok) {
            throw new Error("Failed preload: " + key);
          }
          var reader = response.body && response.body.getReader ? response.body.getReader() : null;
          if (!reader) {
            var whole = await response.arrayBuffer();
            this.loadedByKey[key] = whole.byteLength;
            this.recalcProgress();
            return whole;
          }
          var chunks = [];
          var received = 0;
          while (true) {
            var part = await reader.read();
            if (part.done) {
              break;
            }
            chunks.push(part.value);
            received += part.value.byteLength;
            this.loadedByKey[key] = Math.max(received, this.loadedByKey[key] || 0);
            this.recalcProgress();
          }
          var total = 0;
          for (var i = 0; i < chunks.length; i++) {
            total += chunks[i].byteLength;
          }
          var merged = new Uint8Array(total);
          var offset = 0;
          for (var j = 0; j < chunks.length; j++) {
            merged.set(chunks[j], offset);
            offset += chunks[j].byteLength;
          }
          this.loadedByKey[key] = total;
          this.recalcProgress();
          return merged.buffer;
        },
        start: async function() {
          if (this.started) {
            return;
          }
          this.started = true;
          this.state = "preloading";
          this.totalExpected = this.expectedBytes.fmf + this.expectedBytes.game + this.expectedBytes.progs;
          this.loadedByKey = { fmf: 0, game: 0, progs: 0 };
          IntroUI.setState("loading");
          IntroUI.setStatus("PRELOADING PACKAGES... 0%", 0, false);

          try {
            var results = await Promise.all([
              this.fetchWithProgress("fmf", this.urls.fmf),
              this.fetchWithProgress("game", this.urls.game),
              this.fetchWithProgress("progs", this.urls.progs)
            ]);

            this.buffers.fmf = results[0];
            this.buffers.game = results[1];
            this.buffers.progs = results[2];

            Module.files["default.fmf"] = this.buffers.fmf;
            Module.files["nzp/game.pk3"] = this.buffers.game;
            Module.files["nzp/progs.pk3"] = this.buffers.progs;

            this.progress = 100;
            this.state = "ready";
            IntroUI.setStatus("PACKAGES READY. PRESS ENTER.", 100, false);
            BootBridge.onPreloadReady();
          } catch (err) {
            this.state = "failed";
            console.error(err);
            IntroUI.setStatus("PRELOAD FAILED. RETRYING...", this.progress, false);
            var self = this;
            setTimeout(function() {
              self.started = false;
              self.start();
            }, 1200);
          }
        }
      };

      var Module = {
        files: {
          "default.fmf": withRev("default.fmf"),
          "nzp/game.pk3": withRev("nzp/game.pk3"),
          "nzp/progs.pk3": withRev("nzp/progs.pk3")
        },
        locateFile: function(path) {
          if (path === "ftewebgl.wasm") {
            return withRev(path);
          }
          return path;
        },
        print: function(msg) {
          console.log(msg);
        },
        printErr: function(text) {
          console.log(text);
        },
        canvas: document.getElementById("canvas"),
        setStatus: function(text) {
          if (Module.setStatus.interval) {
            clearInterval(Module.setStatus.interval);
          }
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var statusElement = document.getElementById("status");
          var progressElement = document.getElementById("progress");
          var percent = null;
          var indeterminate = true;

          if (m) {
            text = m[1].trim();
            var v = parseFloat(m[2]);
            var max = parseFloat(m[4]);
            progressElement.value = v;
            progressElement.max = max;
            progressElement.hidden = false;
            if (max > 0) {
              percent = (v / max) * 100;
              indeterminate = false;
            }
          } else {
            progressElement.value = null;
            progressElement.max = null;
            progressElement.hidden = true;
          }

          statusElement.innerHTML = text;
          statusElement.hidden = text.length === 0;

          if (BootBridge.started && !IntroUI.handoffDone) {
            IntroUI.setState("loading");
            IntroUI.setStatus((text || "INITIALIZING ENGINE...").toUpperCase(), typeof percent === "number" ? percent : 100, indeterminate);
          }
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")" : "All downloads complete.");
        },
        postRun: [
          function() {
            if (Module["sched"] === undefined) {
              IntroUI.markEngineInitFailed();
              return;
            }
            IntroUI.markEngineReady();
            setTimeout(function() {
              if (!IntroUI.handoffDone) {
                IntroUI.tryHandoff();
              }
            }, 2500);
          }
        ]
      };

      function begin() {
        if (Module.began) {
          return;
        }
        Module.began = true;
        document.getElementById("dropzone").hidden = true;
        document.getElementById("begin").hidden = true;
        Module.setStatus("Initializing engine...");

        var s = document.createElement("script");
        s.setAttribute("src", withRev("ftewebgl.js"));
        s.setAttribute("type", "text/javascript");
        s.setAttribute("charset", "utf-8");
        s.addEventListener("error", function() {
          alert("Unable to download engine javascript");
          Module.setStatus("Unable to download engine javascript");
        }, false);
        document.head.appendChild(s);
      }

      function fixupfilepath(fname, path) {
        if (path != "") {
          return path + fname;
        }
        var ext = fname.substr(fname.lastIndexOf(".") + 1);
        if (ext == "fmf" || ext == "kpf") {
          return fname;
        }
        if (ext == "bsp" || ext == "map" || ext == "lit" || ext == "lux") {
          return "id1/maps/" + fname;
        }
        return "id1/" + fname;
      }

      function showfiles() {
        if (Module.began) {
          return;
        }
        Module.setStatus("");
        document.getElementById("dropzone").hidden = false;
        document.getElementById("begin").hidden = false;
        var nt = "Drag gamedirs or individual package files here to make them available!<br/>Active Files:<br/><pre>";
        var keys = Object.keys(Module.files);
        for (var i = 0; i < keys.length; i++) {
          if (Module.files[keys[i]] instanceof ArrayBuffer) {
            var sz = Module.files[keys[i]].byteLength;
            if (sz > 512 * 1024) {
              sz = (sz / (1024 * 1024)) + "mb";
            } else if (sz > 512) {
              sz = (sz / 1024) + "kb";
            } else {
              sz = sz + " bytes";
            }
            nt += "    " + keys[i] + " (" + sz + ")<br/>";
          } else {
            nt += "    " + keys[i] + "<br/>";
          }
        }
        nt += "</pre>(" + keys.length + " files)";
        document.getElementById("dropzone").innerHTML = nt;
      }

      function scanfiles(item, path) {
        if (item.isFile) {
          item.file(function(f) {
            var n = fixupfilepath(f.name, path);
            Module.files[n] = f.arrayBuffer();
            Module.files[n].then(function(buf) {
              Module.files[n] = buf;
              showfiles();
            });
          });
        } else if (item.isDirectory) {
          var dirReader = item.createReader();
          dirReader.readEntries(function(entries) {
            for (var i = 0; i < entries.length; i++) {
              scanfiles(entries[i], path + item.name + "/");
            }
          });
        }
      }

      function gotdrop(ev) {
        ev.preventDefault();
        for (var i = 0; i < ev.dataTransfer.items.length; i++) {
          if (ev.dataTransfer.items[i].webkitGetAsEntry) {
            var d = ev.dataTransfer.items[i].webkitGetAsEntry();
            if (d) {
              scanfiles(d, "");
            }
          } else if (ev.dataTransfer.items[i].kind === "file") {
            var f = ev.dataTransfer.items[i].getAsFile();
            var n = fixupfilepath(f.name);
            Module.files[n] = f.arrayBuffer();
            Module.files[n].then(function(buf) {
              Module.files[n] = buf;
              showfiles();
            });
          }
        }
        showfiles();
      }

      (function initIntroBoot() {
        if (!IntroUI.init()) {
          showfiles();
          return;
        }

        IntroUI.els.input.value = NameStore.load();
        BootPreload.start();
        IntroUI.els.enter.addEventListener("click", function() {
          BootBridge.handleEnterAction();
        });
        IntroUI.els.input.addEventListener("input", function() {
          IntroUI.refreshNameCaret();
        });
        IntroUI.els.input.addEventListener("focus", function() {
          IntroUI.refreshNameCaret();
        });
        IntroUI.els.input.addEventListener("blur", function() {
          IntroUI.refreshNameCaret();
        });
        IntroUI.els.input.addEventListener("keydown", function(ev) {
          if (ev.key === "Enter") {
            ev.preventDefault();
            BootBridge.handleEnterAction();
          }
        });
        IntroUI.refreshNameCaret();

        if (window.location.hash != "") {
          BootBridge.pendingStart = true;
          requestAnimationFrame(function() {
            setTimeout(function() {
              BootBridge.handleEnterAction();
            }, 60);
          });
        }
      })();
    </script>
